name: Deploy Preprod

on:
  push:
    branches:
      - preprod

permissions:
  contents: write        # ← add this

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build preprod
        run: npm run build -- --mode preprod

      - name: Add CNAME for preprod
        run: echo "preprod.sbsgroupbharat.com" > dist/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages-preprod