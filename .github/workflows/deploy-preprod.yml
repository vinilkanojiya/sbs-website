name: Deploy Preprod

on:
  push:
    branches:
      - preprod

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build preprod
        run: npm run build -- --mode preprod

      - name: Add CNAME for preprod
        run: echo "preprod.sbsgroupbharat.com" > dist/CNAME

      - name: Deploy to sbs-website-preprod repo
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PREPROD_DEPLOY_TOKEN }}
          external_repository: vinilkanojiya/sbs-website-preprod
          publish_dir: ./dist
          publish_branch: gh-pages